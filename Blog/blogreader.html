<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>matt wetzel</title>
    </head>
    <body style = 'font-family: Arial; margin: 0px'>
        <div id="divmain" style="height: 100vh; width: 100vw; display: flex;">
            <script type="text/javascript">
                links = [
                    ['1', './posts/1.md'],
                    ['2', './posts/2.md'],
                    ['3', './posts/3.md'],
                ]

                sidebox = document.createElement('div')
                sidebox.id = 'sidebox'
                sidebox.style = 'background-color: rgba(200,200,200,.6); text-align: center; margin: 0px; width: 20vw; height: 100%; overflow: scroll;'
                // add text to sidebox
                sidebox.innerHTML += '<h1>' + 'Posts' + '</h1>'

                document.getElementById('divmain').appendChild(sidebox)

                function showpost(source) {
                    document.getElementById('zeromdelement').remove()
                    newmd = document.createElement('zero-md')
                    // newmd = document.createElement('p')
                    newmd.id = 'zeromdelement'
                    // newmd.src = source
                    // newmd.style = "margin: 10px;"
                    // newmd.innerHTML = 'jhey it worked'
                    newmd.innerHTML = "'<div style = 'left: 0px; top: 0px; color: rgba(255,255,255,1.0); background: rgba(0,0,0,.7); height: 6vh; width: 90vw;'><p id='shoutout'>Markdown converted to html with: <a href='https://zerodevx.github.io/zero-md/' style = 'color:#39c;'>zero-md</a></p></div>'"
                    document.getElementById('blogpost').appendChild(newmd)
                    // document.getElementById('zeromdelement').src = source

                }

                for (l of links) {
                    lnk = document.createElement('div')
                    lnk.style = 'background-color: rgba(0,0,0,0); margin: 0px; text-align: center; width: auto; height: 10vh; padding: 20px; bottom: 0px;  float: top;'
                    lnk.onmouseover = function () {this.style.backgroundColor = 'rgba(0,0,0,.2)'}
                    lnk.onmouseout = function () {this.style.backgroundColor = 'rgba(0,0,0,0)'}
                    lnk.onclick = function () {showpost(l[1])}
                    lnk.innerHTML = '<p style="vertical-align: middle; color: rgba(0,0,0,.7); font-size: 25px; font-weight: bold;">' + l[0] + '</p>'
                    sidebox.appendChild(lnk)
                }
            </script>

            <div id='blogpost' style="height: 100%; background: rgba(255,255,255,.7); width: 100%; overflow: scroll; margin: 0px;">
                <div style = "left: 0px; top: 0px; color: rgba(255,255,255,1.0); background: rgba(0,0,0,.7); height: auto; width: 100%;">
                    <p id='shoutout'>Markdown converted to html with: <a href='https://zerodevx.github.io/zero-md/' style = 'color:#39c;'>zero-md</a></p>
                </div>

                <!-- taken directly from zero md guide: -->
                <!-- Lightweight client-side loader that feature-detects and load polyfills only when necessary -->
                <script src="https://cdn.jsdelivr.net/npm/@webcomponents/webcomponentsjs@2/webcomponents-loader.min.js"></script>

                <!-- Load the element definition -->
                <script type="module" src="https://cdn.jsdelivr.net/gh/zerodevx/zero-md@1/src/zero-md.min.js"></script>
          
                <!-- <zero-md id='zeromdelement' style="margin: 10px;" src="../resources/prerendered/cv.md"> -->
                <zero-md id='zeromdelement' style="margin: 10px;" src="./posts/1.md">
                </zero-md>

            </div>

        </div>

    </body>
</html>
