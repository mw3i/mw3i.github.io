<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>matt wetzel</title>
    </head>
    <body style = 'font-family: Arial; margin: 0px'>

        <script type="text/javascript">
            links = [
                ['1', 'https://mw3i.github.io/Blog/posts/1.md'],
                ['2', 'https://mw3i.github.io/Blog/posts/2.md'],
                ['3', 'https://mw3i.github.io/Blog/posts/3.md'],
            ]

            sidebox = document.createElement('div')
            sidebox.id = 'sidebox'
            sidebox.style = 'background-color: rgba(200,200,200,.6); text-align: center; margin: 0px; width: 20vw; height: 100%; position: absolute;'
            // add text to sidebox
            sidebox.innerHTML += '<h1>' + 'Posts' + '</h1>'

            document.body.appendChild(sidebox)

            function showpost(source) {
                console.log('its going')
                document.getElementById('zeromdelement').remove()
                newmd = document.createElement('zero-md')
                newmd.id = 'zeromdelement'
                newmd.src = source
                document.getElementById('blogpost').appendChild(newmd)
                // document.getElementById('zeromdelement').src = source

            }

            for (l of links) {
                lnk = document.createElement('div')
                lnk.style = 'background-color: rgba(0,0,0,0); margin: 0px; text-align: center; width: auto; height: 10vh; padding: 20px; bottom: 0px;  float: top;'
                lnk.onmouseover = function () {this.style.backgroundColor = 'rgba(0,0,0,.2)'}
                lnk.onmouseout = function () {this.style.backgroundColor = 'rgba(0,0,0,0)'}
                lnk.onclick = function () {showpost(l[1])}
                lnk.innerHTML = '<p style="vertical-align: middle; color: rgba(0,0,0,.7); font-size: 25px; font-weight: bold;">' + l[0] + '</p>'
                sidebox.appendChild(lnk)
            }
        </script>

        <div id='blogpost'>
            <!-- taken directly from zero md guide: -->
            <!-- Lightweight client-side loader that feature-detects and load polyfills only when necessary -->
            <script src="https://cdn.jsdelivr.net/npm/@webcomponents/webcomponentsjs@2/webcomponents-loader.min.js"></script>

            <!-- Load the element definition -->
            <script type="module" src="https://cdn.jsdelivr.net/gh/zerodevx/zero-md@1/src/zero-md.min.js"></script>
            <zero-md id='zeromdelement'></zero-md>

        </div>

    </body>
</html>
