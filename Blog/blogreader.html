<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>matt wetzel</title>
    </head>
    <body style = 'font-family: Arial; margin: 0px'>
        <div id="divmain" style="height: 100vh; width: 100vw; display: flex;">
            <script type="text/javascript">
                links = [
                    ['1', './posts/1.html'],
                    ['2', './posts/2.html'],
                    ['3', './posts/3.html'],
                ]

                sidebox = document.createElement('div')
                sidebox.id = 'sidebox'
                sidebox.style = 'background-color: rgba(200,200,200,.6); text-align: center; margin: 0px; width: 20vw; height: 100%; overflow: scroll;'
                // add text to sidebox
                sidebox.innerHTML += '<h1>' + 'Posts' + '</h1>'

                document.getElementById('divmain').appendChild(sidebox)

                function showpost(source) {
                    document.getElementById('frame').remove()
                    newpost = document.createElement('iframe')
                    newpost.id = 'frame'
                    newpost.src = source
                    newpost.style = "margin: 10px;"
                    document.getElementById('blogpost').appendChild(newpost)
                    // document.getElementById('zeromdelement').src = source

                }

                for (l of links) {
                    lnk = document.createElement('div')
                    lnk.style = 'background-color: rgba(0,0,0,0); margin: 0px; text-align: center; width: auto; height: 10vh; padding: 20px; bottom: 0px;  float: top;'
                    lnk.onmouseover = function () {this.style.backgroundColor = 'rgba(0,0,0,.2)'}
                    lnk.onmouseout = function () {this.style.backgroundColor = 'rgba(0,0,0,0)'}
                    lnk.onclick = function () {showpost(l[1])}
                    lnk.innerHTML = '<p style="vertical-align: middle; color: rgba(0,0,0,.7); font-size: 25px; font-weight: bold;">' + l[0] + '</p>'
                    sidebox.appendChild(lnk)
                }
            </script>

            <div id='blogpost' style="height: 100%; background: rgba(255,255,255,.7); width: 100%; overflow: scroll; margin: 0px;">
                <iframe id="frame" src="posts/1.html" style="height: 100%; width: 100%;"></iframe>
            </div>

        </div>

    </body>
</html>
