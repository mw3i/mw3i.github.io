<button class="btn d-block d-md-none position-fixed top-0 start-0 z-3 m-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNav" aria-controls="offcanvasNav">
    <i class="hovercard bi bi-list text-white fs-1 rounded-3 p-3"></i>
</button>

<div class="offcanvas offcanvas-start bg-dark text-white w-100" tabindex="-1" id="offcanvasNav" aria-labelledby="offcanvasNavLabel">
    <div class="offcanvas-header">
        <button type="button" class="btn-close btn-close-white me-auto p-4" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body w-100">
        <div class='col-9 mx-auto' style="">
            {% include profile_nav.html %}
        </div>
    </div>
</div>


<div class='row w-100 m-0 text-white h-100'>
    <!-- profile -->
    <div class='col-4 col-lg-3 d-none d-md-block d-flex flex-column z-3 h-100' style="">
    <!-- <div class='col-4 d-none d-md-block d-flex flex-column z-3 bg-warning vh-100 position-fixed' style=""> -->
        <div class='col-12 col-lg-10 h-100 overflow-y-auto'>
            {% include profile_nav.html %}
        </div>
    </div>
    <!-- main page -->
    <div class='ms-auto col-12 col-md-8 pt-5 pb-2 h-100'>
        <div class='mx-auto py-5 pe-5 col-12 h-100 overflow-y-auto' data-bs-spy="scroll" data-bs-target="#navbar-example2" data-bs-root-margin="0px 0px -40%" data-bs-smooth-scroll="true" class="scrollspy-example bg-body-tertiary p-3 rounded-2" tabindex="0">
            {{ content }}
        </div>
    </div>
</div>
